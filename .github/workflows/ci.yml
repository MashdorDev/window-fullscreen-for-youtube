name: CI

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext lint
        run: npx --yes web-ext lint --ignore-files "AMO-LISTING.md"

  build:
    name: Build .xpi
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext build
        run: npx --yes web-ext build --overwrite-dest --ignore-files "AMO-LISTING.md" "CONTRIBUTING.md"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: web-ext-artifacts/*.zip
          retention-days: 14

  deploy-amo:
    name: Upload to Firefox AMO
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext sign (listed channel)
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::warning::AMO_JWT_ISSUER / AMO_JWT_SECRET not set; skipping AMO upload."
            exit 0
          fi
          npx --yes web-ext sign \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET" \
            --channel=listed \
            --ignore-files "AMO-LISTING.md" "CONTRIBUTING.md"

  release:
    name: Attach .xpi to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: ./artifact
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifact/*.zip
