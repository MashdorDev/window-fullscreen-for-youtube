name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext lint
        run: npx --yes web-ext lint --ignore-files "AMO-LISTING.md" "web-ext-artifacts" ".github"

  build:
    name: Build .xpi
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext build
        run: npx --yes web-ext build --overwrite-dest --ignore-files "AMO-LISTING.md" ".github"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: web-ext-artifacts/*.zip
          retention-days: 14
