name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint:
    name: Lint extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext lint
        run: npx --yes web-ext lint

  build:
    name: Build .zip
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext build
        run: npx --yes web-ext build --overwrite-dest
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: web-ext-artifacts/*.zip
          retention-days: 14

  # Store deploys + GitHub Release run only when manifest.json's version
  # changes on a push to main (i.e. a version-bumping PR was merged).
  # Docs/refactor merges leave the version untouched and deploy nothing.
  detect-version:
    name: Detect version bump
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          CURRENT="$(node -p "require('./manifest.json').version")"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          PREVIOUS=""
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] \
             && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null \
             && git cat-file -e "${BEFORE}:manifest.json" 2>/dev/null; then
            git show "${BEFORE}:manifest.json" > prev-manifest.json
            PREVIOUS="$(node -p "require('./prev-manifest.json').version")"
            rm -f prev-manifest.json
          fi
          echo "Previous version: '${PREVIOUS:-<none>}' | Current version: '$CURRENT'"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version bumped to $CURRENT — store deploy will run."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Version unchanged ($CURRENT) — skipping store deploy."
          fi

  deploy-firefox:
    name: Publish to Firefox (AMO)
    runs-on: ubuntu-latest
    needs: [build, detect-version]
    if: needs.detect-version.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext sign --channel=listed
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::error::AMO credentials (AMO_JWT_ISSUER / AMO_JWT_SECRET) not set."
            exit 1
          fi
          npx --yes web-ext sign \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET" \
            --channel=listed

  # Runs only after Firefox publishes successfully ("Firefox, and after that Chrome").
  deploy-chrome:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: [deploy-firefox, detect-version, build]
    if: needs.detect-version.outputs.changed == 'true'
    steps:
      - name: Check Chrome Web Store credentials
        id: check
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
        run: |
          if [ -z "$CWS_CLIENT_ID" ]; then
            echo "::warning::Chrome Web Store secrets not set; skipping Chrome publish."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Download build artifact
        if: steps.check.outputs.ready == 'true'
        uses: actions/download-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: ./artifact
      - name: Upload to Chrome Web Store
        if: steps.check.outputs.ready == 'true'
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4 # v6.0.0
        with:
          file-path: ./artifact/*.zip
          glob: true
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}

  # Once Firefox publishes, cut a GitHub Release tagged v<version> with the
  # signed unlisted .xpi (for self-distribution) and the build .zip. Waits for
  # the Chrome attempt to finish but does not require it to succeed.
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-firefox, deploy-chrome, detect-version, build]
    if: ${{ !cancelled() && needs.detect-version.outputs.changed == 'true' && needs.deploy-firefox.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web-ext sign --channel=unlisted
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::warning::AMO credentials not set; skipping unlisted sign."
            exit 0
          fi
          npx --yes web-ext sign \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET" \
            --channel=unlisted
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: ./artifact
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          name: v${{ needs.detect-version.outputs.version }}
          generate_release_notes: true
          files: |
            web-ext-artifacts/*.xpi
            ./artifact/*.zip
